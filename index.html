<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渠道投放分析工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif; background: #f0f6ff; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const F = {
  channelId: "归因后调起渠道号", channelL3: "归因后调起三级渠道分类", paidL3: "付费调起三级分类",
  channel: "渠道", healthDAU: "健康调起归因DAU（日均）", totalDAU: "大盘归因DAU",
  uvPct: "健康uv渗透率", healthRev: "健康7日归一收益", healthCAC: "健康 cac",
  healthROI: "ROI_7日预估_健康", healthBrand: "健康品专收入占比",
  chDeltaRev: "7日归一delta收益-渠道号", chCAC: "cac-渠道号", chROI: "ROI_7日预估_渠道号", chBrand: "品专收入占比_渠道号",
  mktDeltaRev: "7日归一delta收益_渠道大盘", mktCAC: "cac_渠道大盘", mktROI: "ROI_7日预估_渠道大盘", mktBrand: "品专收入占比_渠道大盘",
};

function toNum(v) { if (v == null) return null; const s = String(v).replace(/[,%]/g, "").trim(); if (!s || s === "-") return null; const n = parseFloat(s); return isNaN(n) ? null : n; }
function fmt(v, d = 2) { return v == null ? "N/A" : Number(v).toFixed(d); }
function fmtPct(v) { if (v == null) return "N/A"; const n = typeof v === "number" ? v : toNum(v); if (n === null) return "N/A"; return (n > 1 ? n : n * 100).toFixed(1) + "%"; }
function fmtWan(v) { if (v == null || isNaN(v)) return "—"; if (v >= 10000) return (v / 10000).toFixed(1) + "万"; if (v >= 1000) return (v / 1000).toFixed(1) + "k"; return Math.round(v).toLocaleString(); }
function mean(arr) { const v = arr.filter(x => x !== null && !isNaN(x)); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null; }
function parseCSV(text) { const norm = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n"); const lines = norm.trim().split("\n"); if (lines.length < 2) return { headers: [], rows: [] }; const sep = lines[0].includes("\t") ? "\t" : ","; const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, "")); const rows = []; for (let i = 1; i < lines.length; i++) { const vals = lines[i].split(sep).map(v => v.trim().replace(/^"|"$/g, "")); if (vals.length < 2) continue; const r = {}; headers.forEach((h, j) => { r[h] = vals[j] ?? ""; }); rows.push(r); } return { headers, rows }; }
function healthRatio(row) { const h = toNum(row[F.healthDAU]), t = toNum(row[F.totalDAU]); if (h === null || t === null || t === 0) return null; return h / t; }
function channelType(row) { const r = healthRatio(row); if (r === null) return "unknown"; return r >= 0.6 ? "health" : "mixed"; }
function getBenchmark(row) { if (channelType(row) === "health") return { rev: toNum(row[F.mktDeltaRev]), cac: toNum(row[F.mktCAC]), roi: toNum(row[F.mktROI]), label: "渠道大盘" }; return { rev: toNum(row[F.chDeltaRev]), cac: toNum(row[F.chCAC]), roi: toNum(row[F.chROI]), label: "渠道号整体" }; }
function getRowQuadrant(row, type) { const hRev = toNum(row[F.healthRev]), hCAC = toNum(row[F.healthCAC]); const bRev = type === "health" ? toNum(row[F.mktDeltaRev]) : toNum(row[F.chDeltaRev]); const bCAC = type === "health" ? toNum(row[F.mktCAC]) : toNum(row[F.chCAC]); if (hRev === null || hCAC === null || bRev === null || bCAC === null) return null; const hr = hRev >= bRev, hc = hCAC >= bCAC; if (hr && !hc) return 1; if (!hr && !hc) return 2; if (hr && hc) return 3; return 4; }
function getROICompare(row) { const type = channelType(row); const hROI = toNum(row[F.healthROI]); if (hROI === null) return { label: "无数据", color: "#9ca3af" }; const benchROI = type === "health" ? toNum(row[F.mktROI]) : toNum(row[F.chROI]); if (benchROI === null) return { label: "无数据", color: "#9ca3af" }; return hROI >= benchROI ? { label: "ROI优势", color: "#059669" } : { label: "ROI劣势", color: "#dc2626" }; }

const Q_CFG = {
  1: { label: "高收益·低成本", color: "#059669", bg: "#f0fdf4", action: "加大预算，争取更多健康DAU" },
  2: { label: "低收益·低成本", color: "#0891b2", bg: "#eff6ff", action: "优化素材和定向，提升收益后放量" },
  3: { label: "高收益·高成本", color: "#f59e0b", bg: "#fffbeb", action: "保持量级，重点优化CAC降低获客成本" },
  4: { label: "低收益·高成本", color: "#dc2626", bg: "#fff5f5", action: "降价或暂停，排查转化链路漏损" },
};

function Tag({ t, c }) { return <span style={{ background: c + "18", color: c, border: "1px solid " + c + "40", borderRadius: 5, padding: "2px 8px", fontSize: 11, marginRight: 4, display: "inline-block", whiteSpace: "nowrap" }}>{t}</span>; }
function Card({ children, style }) { return <div style={{ background: "#fff", borderRadius: 12, padding: "16px 20px", boxShadow: "0 1px 6px rgba(0,0,0,0.07)", marginBottom: 14, ...(style || {}) }}>{children}</div>; }

function getPriority(secType, roiGroup, q, dauPct) {
  if (secType === "health") {
    if (roiGroup === "good") {
      if (q === 1) return { label: "🔴 P0", color: "#dc2626", hl: true };
      if (q === 3) return { label: "🟠 P1", color: "#ea580c", hl: false };
    } else {
      if (q === 3) return { label: "🟠 P0", color: "#dc2626", hl: true };
      if (q === 4 && dauPct >= 30) return { label: "🟡 P0", color: "#dc2626", hl: true };
      if (q === 4) return { label: "🟡 P1", color: "#d97706", hl: false };
    }
  } else {
    if (roiGroup === "good") { if (q === 1) return { label: "🔴 P1", color: "#ea580c", hl: false }; }
    else { if (q === 4) return { label: "🟡 P1", color: "#d97706", hl: false }; }
  }
  return { label: "🟢 观察", color: "#059669", hl: false };
}

function FrameworkTable({ healthGood, healthBad, mixedGood, mixedBad, totalHealthDAU, extraCols }) {
  const strategyCol = (extraCols || []).find(c => c.includes("策略") || c.includes("strategy"));
  function buildRows(src, type) {
    const qm = { 1: [], 2: [], 3: [], 4: [] };
    (src || []).forEach(r => { const q = getRowQuadrant(r, type); if (q) qm[q].push(r); });
    return [
      { q: 1, sit: "高收益、低成本", act: "优质放量：加预算、提cac，争取更多DAU", rows: qm[1] },
      { q: 3, sit: "高收益、高成本", act: "降本保量：保持量级，优化cac降低获客成本", rows: qm[3] },
      { q: 2, sit: "低收益、低成本", act: "观察优化：优化query收益，提升收益后放量", rows: qm[2] },
      { q: 4, sit: "低收益、高成本", act: "收缩止损：降价或暂停，排查转化链路", rows: qm[4] },
    ].map(it => ({ ...it, dauTotal: it.rows.reduce((s, r) => s + (toNum(r[F.healthDAU]) || 0), 0), dauPct: totalHealthDAU > 0 ? (it.rows.reduce((s, r) => s + (toNum(r[F.healthDAU]) || 0), 0) / totalHealthDAU * 100) : 0, top3: [...it.rows].sort((a, b) => (toNum(b[F.healthDAU]) || 0) - (toNum(a[F.healthDAU]) || 0)).slice(0, 3) }));
  }
  const secs = [
    { tl: "健康占比高（≥60%）", tc: "#059669", tb: "#f0fdf4", st: "health", gs: [{ rl: "roi≥大盘", rg: "good", rows: buildRows(healthGood, "health"), c: "#059669" }, { rl: "roi<大盘", rg: "bad", rows: buildRows(healthBad, "health"), c: "#dc2626" }] },
    { tl: "健康占比低（<60%）", tc: "#7c3aed", tb: "#faf5ff", st: "mixed", gs: [{ rl: "roi≥渠道号", rg: "good", rows: buildRows(mixedGood, "mixed"), c: "#7c3aed" }, { rl: "roi<渠道号", rg: "bad", rows: buildRows(mixedBad, "mixed"), c: "#f59e0b" }] },
  ];
  return (
    <Card style={{ marginTop: 14 }}>
      <h3 style={{ margin: "0 0 14px", fontSize: 15 }}>📋 渠道投放现状分析框架</h3>
      <div style={{ overflowX: "auto" }}>
        {secs.map((sec, si) => (
          <div key={si} style={{ marginBottom: si < secs.length - 1 ? 20 : 0 }}>
            <div style={{ background: sec.tb, borderRadius: "8px 8px 0 0", padding: "10px 14px", border: "1px solid " + sec.tc + "30", borderBottom: "none" }}>
              <span style={{ background: sec.tc, color: "#fff", borderRadius: 5, padding: "2px 10px", fontSize: 12, fontWeight: 700 }}>{sec.tl}</span>
            </div>
            {sec.gs.map((grp, gi) => {
              const vc = grp.rows.filter(it => it.rows.length > 0).reduce((s, i) => s + i.rows.length, 0);
              return (
                <div key={gi}>
                  <div style={{ background: "#f9fafb", padding: "7px 14px", borderLeft: "1px solid #e5e7eb", borderRight: "1px solid #e5e7eb", borderTop: gi > 0 ? "1px solid #e5e7eb" : "none" }}>
                    <span style={{ fontWeight: 600, color: grp.c, fontSize: 12 }}>{grp.rl}</span>
                    <span style={{ fontSize: 11, color: "#9ca3af", marginLeft: 6 }}>({vc}个渠道号)</span>
                  </div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, borderLeft: "1px solid #e5e7eb", borderRight: "1px solid #e5e7eb" }}>
                    <thead><tr style={{ background: "#f3f4f6" }}>{["优先级", "现状（象限）", "渠道号数", "健康DAU占比", "DAU TOP3 渠道号", "行动方向"].map(h => (<th key={h} style={{ padding: "7px 10px", textAlign: "left", color: "#6b7280", fontWeight: 600, whiteSpace: "nowrap", borderBottom: "1px solid #e5e7eb", fontSize: 11 }}>{h}</th>))}</tr></thead>
                    <tbody>{grp.rows.map((it, ii) => {
                      if (it.rows.length === 0) return null;
                      const pri = getPriority(sec.st, grp.rg, it.q, it.dauPct);
                      const hlBg = pri.hl ? "#fde68a" : (ii % 2 === 0 ? "#fff" : "#fafafa");
                      return (
                        <tr key={ii} style={{ borderBottom: pri.hl ? "2px solid #f59e0b" : "1px solid #f3f4f6", background: hlBg }}>
                          <td style={{ padding: "8px 10px", whiteSpace: "nowrap" }}><span style={{ background: pri.color + "18", color: pri.color, borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{pri.label}</span></td>
                          <td style={{ padding: "8px 10px" }}><span style={{ background: Q_CFG[it.q].color + "18", color: Q_CFG[it.q].color, border: "1px solid " + Q_CFG[it.q].color + "40", borderRadius: 5, padding: "2px 8px", fontSize: 11 }}>{it.sit}</span></td>
                          <td style={{ padding: "8px 10px", fontWeight: 600, color: Q_CFG[it.q].color }}>{it.rows.length}个</td>
                          <td style={{ padding: "8px 10px" }}><b style={{ color: Q_CFG[it.q].color, fontSize: pri.hl ? 14 : 12 }}>{it.dauPct.toFixed(1)}%</b><span style={{ color: "#9ca3af", fontSize: 10, marginLeft: 4 }}>({fmtWan(it.dauTotal)})</span></td>
                          <td style={{ padding: "8px 10px" }}>{it.top3.length > 0 ? it.top3.map((r, ti) => {
                            const dau = toNum(r[F.healthDAU]); const st = strategyCol ? (r[strategyCol] || "") : "";
                            return (<div key={ti} style={{ display: "inline-flex", alignItems: "center", background: pri.hl ? "#fff7ed" : "#f3f4f6", borderRadius: 5, padding: "2px 8px", fontSize: 10, marginRight: 5, marginBottom: 3, border: pri.hl ? "1px solid #fed7aa" : "1px solid transparent" }}>
                              <span style={{ color: "#1d4ed8", fontWeight: 600 }}>{r[F.channelId]}</span>
                              {dau > 0 && <span style={{ color: pri.hl ? "#ea580c" : "#6b7280", fontWeight: pri.hl ? 700 : 400, marginLeft: 3 }}>{fmtWan(dau)}</span>}
                              {st ? <span style={{ color: "#9ca3af", marginLeft: 4, maxWidth: 70, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={st}>·{st}</span> : null}
                            </div>);
                          }) : <span style={{ color: "#9ca3af" }}>—</span>}</td>
                          <td style={{ padding: "8px 10px", color: pri.hl ? "#92400e" : "#374151", fontSize: 11, fontWeight: pri.hl ? 600 : 400 }}>{it.act}</td>
                        </tr>);
                    })}</tbody>
                  </table>
                </div>);
            })}
            <div style={{ borderBottom: "1px solid #e5e7eb", borderLeft: "1px solid #e5e7eb", borderRight: "1px solid #e5e7eb", borderRadius: "0 0 8px 8px", height: 4 }} />
          </div>
        ))}
      </div>
    </Card>
  );
}

function App() {
  const [rows, setRows] = useState(null);
  const [extraCols, setExtraCols] = useState([]);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("overview");
  const [search, setSearch] = useState("");
  const [filterChannel, setFilterChannel] = useState("all");
  const [filterL3, setFilterL3] = useState("all");
  const [filterROI, setFilterROI] = useState("all");
  const [filterQuadrant, setFilterQuadrant] = useState("all");
  const [sortBy, setSortBy] = useState("healthDAU");
  const [selected, setSelected] = useState(null);
  const [parseError, setParseError] = useState(null);

  const handleFile = useCallback(e => {
    const file = e.target.files[0]; if (!file) return; setLoading(true); setParseError(null);
    const reader = new FileReader();
    reader.onload = ev => {
      try { const { headers, rows: raw } = parseCSV(ev.target.result); if (!raw || raw.length === 0) { setParseError("CSV文件为空或格式不正确"); setLoading(false); return; } const known = new Set(Object.values(F)); setExtraCols(headers.filter(h => !known.has(h))); setRows(raw); setTab("overview"); setSelected(null); } catch (err) { setParseError("解析失败：" + (err.message || "请确认为UTF-8编码的CSV文件")); }
      setLoading(false);
    };
    reader.readAsText(file, "utf-8");
  }, []);

  const channels = useMemo(() => rows ? [...new Set(rows.map(r => r[F.channel]).filter(Boolean))] : [], [rows]);
  const l3s = useMemo(() => rows ? [...new Set(rows.map(r => r[F.channelL3]).filter(Boolean))] : [], [rows]);
  const enriched = useMemo(() => {
    if (!rows) return [];
    return rows.map(r => {
      const type = channelType(r);
      return { ...r, _type: type, _bench: getBenchmark(r), _hROI: toNum(r[F.healthROI]), _hRev: toNum(r[F.healthRev]), _hCAC: toNum(r[F.healthCAC]), _hDAU: toNum(r[F.healthDAU]), _tDAU: toNum(r[F.totalDAU]), _ratio: healthRatio(r), _quadrant: getRowQuadrant(r, type), _roiCompare: getROICompare(r) };
    });
  }, [rows]);

  const channelTotalDAU = useMemo(() => { const m = {}; enriched.forEach(r => { const ch = r[F.channel] || "未知"; m[ch] = (m[ch] || 0) + (r._hDAU || 0); }); return m; }, [enriched]);
  const totalHealthDAU = useMemo(() => enriched.reduce((s, r) => s + (r._hDAU || 0), 0), [enriched]);
  const healthRows = useMemo(() => enriched.filter(r => r._type === "health"), [enriched]);
  const mixedRows = useMemo(() => enriched.filter(r => r._type === "mixed"), [enriched]);
  const healthGood = useMemo(() => healthRows.filter(r => { const roi = r._hROI, b = toNum(r[F.mktROI]); return roi !== null && b !== null && roi >= b; }), [healthRows]);
  const healthBad = useMemo(() => healthRows.filter(r => { const roi = r._hROI, b = toNum(r[F.mktROI]); return roi !== null && b !== null && roi < b; }), [healthRows]);
  const mixedGood = useMemo(() => mixedRows.filter(r => { const roi = r._hROI, b = toNum(r[F.chROI]); return roi !== null && b !== null && roi >= b; }), [mixedRows]);
  const mixedBad = useMemo(() => mixedRows.filter(r => { const roi = r._hROI, b = toNum(r[F.chROI]); return roi !== null && b !== null && roi < b; }), [mixedRows]);

  const detailSource = useMemo(() => { if (tab === "health_detail") return healthRows; if (tab === "mixed_detail") return mixedRows; return []; }, [healthRows, mixedRows, tab]);
  const benchName = tab === "health_detail" ? "渠道大盘" : "渠道号整体";

  const filtered = useMemo(() => {
    let data = [...detailSource];
    if (search) { const q = search.toLowerCase(); data = data.filter(r => [r[F.channelId], r[F.channel], r[F.channelL3], r[F.paidL3]].some(v => String(v || "").toLowerCase().includes(q))); }
    if (filterChannel !== "all") data = data.filter(r => r[F.channel] === filterChannel);
    if (filterL3 !== "all") data = data.filter(r => r[F.channelL3] === filterL3);
    if (filterROI === "better") data = data.filter(r => r._roiCompare && r._roiCompare.label === "ROI优势");
    else if (filterROI === "worse") data = data.filter(r => r._roiCompare && r._roiCompare.label === "ROI劣势");
    else if (filterROI === "na") data = data.filter(r => r._roiCompare && r._roiCompare.label === "无数据");
    if (filterQuadrant !== "all") { const qn = parseInt(filterQuadrant); data = data.filter(r => r._quadrant === qn); }
    const sk = F[sortBy]; if (sk) data.sort((a, b) => (toNum(b[sk]) ?? -Infinity) - (toNum(a[sk]) ?? -Infinity));
    return data;
  }, [detailSource, search, filterChannel, filterL3, filterROI, filterQuadrant, sortBy]);

  if (!rows) return (
    <div style={{ background: "#f0f6ff", minHeight: "100vh", padding: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ maxWidth: 540, width: "100%" }}>
        <div style={{ background: "linear-gradient(135deg,#1d4ed8,#7c3aed)", borderRadius: 16, padding: "28px 32px", marginBottom: 20, color: "#fff", textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 10 }}>📡</div>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>渠道投放分析工具</h1>
          <p style={{ margin: "8px 0 0", opacity: .85, fontSize: 13 }}>上传渠道数据，自动分类诊断，四象限定位优先级</p>
        </div>
        <div style={{ background: "#fff", borderRadius: 12, padding: 32, boxShadow: "0 1px 6px rgba(0,0,0,0.07)", border: "2px dashed #bfdbfe", textAlign: "center" }}>
          {loading ? <div style={{ color: "#1d4ed8", fontSize: 15, padding: 20 }}>⏳ 正在解析...</div> : (
            <div>
              <div style={{ fontSize: 44, marginBottom: 12 }}>📂</div>
              <p style={{ color: "#1d4ed8", fontWeight: 600, fontSize: 15, margin: "0 0 6px" }}>上传渠道数据 CSV</p>
              <p style={{ color: "#9ca3af", fontSize: 12, margin: "0 0 20px" }}>Excel 另存为「CSV UTF-8」后上传</p>
              {parseError && <p style={{ color: "#dc2626", fontSize: 12, margin: "0 0 12px" }}>{parseError}</p>}
              <label style={{ background: "#1d4ed8", color: "#fff", borderRadius: 8, padding: "12px 32px", cursor: "pointer", fontSize: 14, fontWeight: 600, display: "inline-block" }}>选择文件上传<input type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} /></label>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  const hc = healthRows.length, mc = mixedRows.length, tc = enriched.length;
  const tabList = [
    { id: "overview", label: "📊 总览" },
    { id: "health_detail", label: "🟢 健康主导渠道号（" + hc + "）" },
    { id: "mixed_detail", label: "🟣 健康低占比渠道号（" + mc + "）" },
  ];
  const isDT = tab === "health_detail" || tab === "mixed_detail";
  const strategyCol = (extraCols || []).find(c => c.includes("策略") || c.includes("strategy"));

  return (
    <div style={{ background: "#f0f6ff", minHeight: "100vh", padding: 20 }}>
      <div style={{ maxWidth: 1100, margin: "0 auto" }}>
        <div style={{ background: "linear-gradient(135deg,#1d4ed8,#7c3aed)", borderRadius: 16, padding: "16px 22px", marginBottom: 14, color: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>📡 渠道投放分析工具</h1>
            <p style={{ margin: "3px 0 0", opacity: .8, fontSize: 12 }}>{"共 " + tc + " 个渠道号 | 健康主导（≥60%） " + hc + " · 健康低占比（<60%） " + mc}</p>
          </div>
          <button onClick={() => { setRows(null); setParseError(null); }} style={{ background: "rgba(255,255,255,0.2)", color: "#fff", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 8, padding: "7px 14px", cursor: "pointer", fontSize: 12 }}>重新上传</button>
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
          {tabList.map(t => (<button key={t.id} onClick={() => { setTab(t.id); setSelected(null); setFilterROI("all"); setFilterQuadrant("all"); setSearch(""); setFilterChannel("all"); setFilterL3("all"); }} style={{ background: tab === t.id ? "#1d4ed8" : "#fff", color: tab === t.id ? "#fff" : "#6b7280", border: "1px solid #e5e7eb", borderRadius: 8, padding: "7px 16px", cursor: "pointer", fontSize: 13, fontWeight: tab === t.id ? 700 : 400 }}>{t.label}</button>))}
        </div>

        {tab === "overview" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 10, marginBottom: 14 }}>
              {[
                { l: "渠道号总数", v: tc, c: "#1d4ed8" },
                { l: "健康主导（≥60%）", v: hc, c: "#059669" },
                { l: "健康低占比（<60%）", v: mc, c: "#7c3aed" },
                { l: "健康DAU合计", v: fmtWan(totalHealthDAU), c: "#0891b2" },
                { l: "ROI优于基准", v: healthGood.length + mixedGood.length, c: "#059669" },
              ].map((it, ci) => (
                <div key={ci} style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", textAlign: "center" }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: it.c }}>{it.v}</div>
                  <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 3 }}>{it.l}</div>
                </div>
              ))}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
              {/* 健康主导面板：4列 */}
              <div style={{ background: "#f0fdf4", borderRadius: 12, padding: 16, border: "1px solid #bbf7d0" }}>
                <div style={{ fontWeight: 700, color: "#059669", fontSize: 14, marginBottom: 10 }}>🟢 健康主导渠道号（≥60%）</div>
                <div style={{ fontSize: 12, color: "#4b5563", lineHeight: 1.7, marginBottom: 10 }}>以健康ROI与<b>渠道大盘ROI</b>对比</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                  {[
                    { l: "渠道号数", v: hc },
                    { l: "健康DAU", v: fmtWan(healthRows.reduce((s, r) => s + (r._hDAU || 0), 0)) },
                    { l: "占总DAU", v: totalHealthDAU > 0 ? ((healthRows.reduce((s, r) => s + (r._hDAU || 0), 0) / totalHealthDAU * 100).toFixed(1) + "%") : "N/A" },
                    { l: "ROI>大盘", v: healthGood.length + "个" },
                  ].map((it, ci) => (
                    <div key={ci} style={{ background: "#fff", borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#059669" }}>{it.v}</div>
                      <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>{it.l}</div>
                    </div>
                  ))}
                </div>
              </div>
              {/* 健康低占比面板：4列 */}
              <div style={{ background: "#faf5ff", borderRadius: 12, padding: 16, border: "1px solid #ddd6fe" }}>
                <div style={{ fontWeight: 700, color: "#7c3aed", fontSize: 14, marginBottom: 10 }}>🟣 健康低占比渠道号（&lt;60%）</div>
                <div style={{ fontSize: 12, color: "#4b5563", lineHeight: 1.7, marginBottom: 10 }}>以健康ROI与<b>渠道号整体ROI</b>对比</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                  {[
                    { l: "渠道号数", v: mc },
                    { l: "健康DAU", v: fmtWan(mixedRows.reduce((s, r) => s + (r._hDAU || 0), 0)) },
                    { l: "占总DAU", v: totalHealthDAU > 0 ? ((mixedRows.reduce((s, r) => s + (r._hDAU || 0), 0) / totalHealthDAU * 100).toFixed(1) + "%") : "N/A" },
                    { l: "ROI>渠道号", v: mixedGood.length + "个" },
                  ].map((it, ci) => (
                    <div key={ci} style={{ background: "#fff", borderRadius: 8, padding: "8px 10px", textAlign: "center" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: "#7c3aed" }}>{it.v}</div>
                      <div style={{ fontSize: 10, color: "#9ca3af", marginTop: 2 }}>{it.l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <FrameworkTable healthGood={healthGood} healthBad={healthBad} mixedGood={mixedGood} mixedBad={mixedBad} totalHealthDAU={totalHealthDAU} extraCols={extraCols} />
          </div>
        )}

        {isDT && (
          <div>
            <Card style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜索渠道号/渠道/分类..." style={{ flex: 1, minWidth: 140, border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 12px", fontSize: 12, outline: "none" }} />
                <select value={filterChannel} onChange={e => setFilterChannel(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 10px", fontSize: 12, background: "#fff" }}><option value="all">全部渠道</option>{channels.map(c => <option key={c} value={c}>{c}</option>)}</select>
                <select value={filterL3} onChange={e => setFilterL3(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 10px", fontSize: 12, background: "#fff" }}><option value="all">全部三级分类</option>{l3s.map(c => <option key={c} value={c}>{c}</option>)}</select>
                <select value={filterROI} onChange={e => setFilterROI(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 10px", fontSize: 12, background: "#fff" }}>
                  <option value="all">全部ROI对比</option>
                  <option value="better">{"ROI优势（好于" + benchName + "）"}</option>
                  <option value="worse">{"ROI劣势（差于" + benchName + "）"}</option>
                  <option value="na">无数据</option>
                </select>
                <select value={filterQuadrant} onChange={e => setFilterQuadrant(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 10px", fontSize: 12, background: "#fff" }}>
                  <option value="all">全部象限</option>
                  <option value="1">Q1 高收益·低成本</option><option value="2">Q2 低收益·低成本</option>
                  <option value="3">Q3 高收益·高成本</option><option value="4">Q4 低收益·高成本</option>
                </select>
                <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ border: "1px solid #e5e7eb", borderRadius: 7, padding: "7px 10px", fontSize: 12, background: "#fff" }}><option value="healthDAU">按健康DAU</option><option value="healthROI">按健康ROI</option><option value="chROI">按渠道ROI</option><option value="healthRev">按健康收益</option></select>
                <span style={{ fontSize: 12, color: "#9ca3af" }}>{"共 " + filtered.length + " 条"}</span>
              </div>
            </Card>

            {filtered.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#9ca3af", fontSize: 14 }}>暂无符合条件的渠道号</div>}

            {filtered.map((row, ri) => {
              const isOpen = selected === ri;
              const bench = row._bench || { rev: null, cac: null, roi: null, label: "—" };
              const dau = row._hDAU || 0, chDAU = channelTotalDAU[row[F.channel]] || 0;
              const roiComp = row._roiCompare || { label: "无数据", color: "#9ca3af" };
              const qi = row._quadrant, qc = qi ? Q_CFG[qi] : null;
              const hRev = row._hRev, hCAC = row._hCAC, bRev = bench.rev, bCAC = bench.cac;
              const bl = bench.label;
              const revCmp = hRev !== null && bRev !== null ? (hRev >= bRev ? "收益≥" + bl : "收益<" + bl) : "—";
              const cacCmp = hCAC !== null && bCAC !== null ? (hCAC >= bCAC ? "成本≥" + bl : "成本<" + bl) : "—";
              const revClr = hRev !== null && bRev !== null ? (hRev >= bRev ? "#059669" : "#dc2626") : "#9ca3af";
              const cacClr = hCAC !== null && bCAC !== null ? (hCAC >= bCAC ? "#dc2626" : "#059669") : "#9ca3af";
              const strategy = strategyCol ? (row[strategyCol] || "") : "";
              return (
                <div key={ri} style={{ background: "#fff", borderRadius: 12, boxShadow: "0 1px 6px rgba(0,0,0,0.07)", marginBottom: 10, overflow: "hidden" }}>
                  <div onClick={() => setSelected(isOpen ? null : ri)} style={{ padding: "13px 18px", cursor: "pointer", display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, color: "#1d4ed8" }}>{row[F.channelId]}</div>
                      <div style={{ fontSize: 11, color: "#9ca3af", marginTop: 1 }}>{row[F.channel] || ""} · {row[F.channelL3] || ""}</div>
                    </div>
                    {strategy && <span style={{ background: "#f0f9ff", color: "#0369a1", borderRadius: 5, padding: "2px 8px", fontSize: 10, whiteSpace: "nowrap", border: "1px solid #bae6fd" }}>{strategy}</span>}
                    <Tag t={roiComp.label} c={roiComp.color} />
                    {qc && <Tag t={"Q" + qi + " " + qc.label} c={qc.color} />}
                    <div style={{ display: "flex", gap: 10, fontSize: 12 }}>
                      <span>健康DAU <b style={{ color: "#059669" }}>{fmtWan(dau)}</b></span>
                      <span>占总健康 <b>{totalHealthDAU > 0 ? ((dau / totalHealthDAU * 100).toFixed(1) + "%") : "N/A"}</b></span>
                      <span>占渠道 <b>{chDAU > 0 ? ((dau / chDAU * 100).toFixed(1) + "%") : "N/A"}</b></span>
                      <span>健康ROI <b style={{ color: roiComp.color }}>{fmt(row._hROI, 3)}</b></span>
                    </div>
                    <span style={{ color: "#9ca3af" }}>{isOpen ? "▲" : "▼"}</span>
                  </div>
                  {isOpen && (
                    <div style={{ borderTop: "1px solid #f3f4f6", padding: "14px 18px", background: "#fafbff" }}>
                      {qc && (
                        <div style={{ background: qc.bg, borderRadius: 8, padding: "10px 14px", marginBottom: 12, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", border: "1px solid " + qc.color + "30" }}>
                          <span style={{ background: qc.color, color: "#fff", borderRadius: 5, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>{"Q" + qi + " " + qc.label}</span>
                          <span style={{ fontSize: 11, color: qc.color, fontWeight: 600 }}>{"🎯 " + qc.action}</span>
                          <div style={{ marginLeft: "auto", display: "flex", gap: 10, fontSize: 11 }}>
                            <span style={{ color: revClr, fontWeight: 600 }}>{revCmp}</span>
                            <span style={{ color: "#d1d5db" }}>|</span>
                            <span style={{ color: cacClr, fontWeight: 600 }}>{cacCmp}</span>
                            <span style={{ color: "#d1d5db" }}>|</span>
                            <span>{"对比项：" + bl}</span>
                          </div>
                        </div>
                      )}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div style={{ background: "#f0fdf4", borderRadius: 8, padding: "12px 14px" }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#059669", marginBottom: 8 }}>🌿 健康数据</div>
                          {[["健康DAU", fmtWan(dau)], ["占总健康DAU", totalHealthDAU > 0 ? (dau / totalHealthDAU * 100).toFixed(1) + "%" : "N/A"], ["占渠道健康DAU", chDAU > 0 ? (dau / chDAU * 100).toFixed(1) + "%" : "N/A"], ["健康占比", fmtPct(row._ratio)], ["健康ROI", fmt(row._hROI, 3)], ["健康收益", fmt(row._hRev, 4)], ["健康CAC", fmt(row._hCAC, 2)]].map(([k, v], ki) => (
                            <div key={ki} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", borderBottom: "1px solid #dcfce7" }}><span style={{ color: "#6b7280" }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span></div>))}
                        </div>
                        <div style={{ background: "#eff6ff", borderRadius: 8, padding: "12px 14px" }}>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#0891b2", marginBottom: 8 }}>{"📊 对比基准：" + bl}</div>
                          {[["基准ROI", fmt(bench.roi, 3)], ["基准收益", fmt(bench.rev, 4)], ["基准CAC", fmt(bench.cac, 2)]].map(([k, v], ki) => (
                            <div key={ki} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "3px 0", borderBottom: "1px solid #dbeafe" }}><span style={{ color: "#6b7280" }}>{k}</span><span style={{ fontWeight: 600 }}>{v}</span></div>))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
